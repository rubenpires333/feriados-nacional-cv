services:
  # Banco de Dados PostgreSQL (Produção)
  db:
    image: postgres:15-alpine
    container_name: postgres-feriados-cv-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backup:/backup:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - feriados-prod-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Aplicação Spring Boot (Produção)
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-feriados-nacionais-cv}-prod
    ports:
      - "${SERVER_PORT:-8083}:8083"
    environment:
      # Configurações do Banco
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      
      # Configurações JPA (Produção)
      - JPA_DDL_AUTO=validate
      - JPA_SHOW_SQL=false
      
      # Configurações de Log (Produção)
      - LOG_LEVEL_ROOT=WARN
      - LOG_LEVEL_APP=INFO
      - LOG_LEVEL_SPRING=WARN
      - LOG_LEVEL_HIBERNATE=ERROR
      
      # Configurações de Segurança
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - API_TOKEN=${API_TOKEN}
      
      # Configurações do Swagger (Desabilitado em produção)
      - SWAGGER_ENABLED=false
      
      # Configurações do Actuator (Limitado em produção)
      - MANAGEMENT_ENDPOINTS_ENABLED=health,info
      
      # Configurações da Aplicação
      - APP_NAME=${APP_NAME:-feriados-nacionais-cv}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - SERVER_PORT=8083
      
      # Configurações JVM para produção
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC -XX:+UseStringDeduplication
      
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - feriados-prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # Nginx Reverse Proxy (Produção)
  nginx:
    image: nginx:alpine
    container_name: nginx-feriados-cv-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - feriados-prod-network

volumes:
  postgres_prod_data:
    driver: local

networks:
  feriados-prod-network:
    driver: bridge