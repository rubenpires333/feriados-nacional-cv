services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ${DB_HOST:-postgres-feriados-cv}
    environment:
      POSTGRES_DB: ${DB_NAME:-feriados_nacionais}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicação Spring Boot
  feriados-nacionais-cv:
    build: .
    container_name: ${APP_NAME:-feriados-nacionais-cv}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker,dev}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-feriados_nacionais}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JPA_DDL_AUTO=${JPA_DDL_AUTO:-update}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL:-true}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-INFO}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-DEBUG}
      - LOG_LEVEL_SPRING=${LOG_LEVEL_SPRING:-INFO}
      - LOG_LEVEL_HIBERNATE=${LOG_LEVEL_HIBERNATE:-DEBUG}
      - DEVTOOLS_RESTART_ENABLED=${DEVTOOLS_RESTART_ENABLED:-true}
      - DEVTOOLS_LIVERELOAD_ENABLED=${DEVTOOLS_LIVERELOAD_ENABLED:-true}
      - JWT_SECRET=${JWT_SECRET:-default-secret-key}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - SPRINGDOC_SWAGGER_UI_ENABLED=${SWAGGER_ENABLED:-true}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=${MANAGEMENT_ENDPOINTS_ENABLED:-health,info,metrics}
    volumes:
      # Hot reload - montar código fonte
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
