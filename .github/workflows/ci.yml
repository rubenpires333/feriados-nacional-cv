name: 🔄 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: 🧪 Testes e Validação
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feriados_nacionais_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: ☕ Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 📦 Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: 🔧 Configurar variáveis de teste
      run: |
        echo "DB_HOST=localhost" >> $GITHUB_ENV
        echo "DB_PORT=5432" >> $GITHUB_ENV
        echo "DB_NAME=feriados_nacionais_test" >> $GITHUB_ENV
        echo "DB_USERNAME=postgres" >> $GITHUB_ENV
        echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
        echo "API_TOKEN=test-token-for-ci" >> $GITHUB_ENV

    - name: 🧪 Executar testes
      run: mvn clean test

    - name: 📊 Verificar compilação
      run: mvn clean compile

    - name: 📋 Verificar formatação de código
      run: mvn spotless:check || echo "⚠️ Formatação pode ser melhorada"

  build:
    name: 🏗️ Build da Aplicação
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: ☕ Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 📦 Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: 🏗️ Build JAR
      run: mvn clean package -DskipTests

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: feriados-cv-jar
        path: target/*.jar

  security-check:
    name: 🔒 Verificação de Segurança
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 🔍 Verificar secrets no código
      run: |
        echo "🔍 Verificando se há tokens ou senhas no código..."
        if grep -r "password.*=" src/ --exclude-dir=target || \
           grep -r "secret.*=" src/ --exclude-dir=target || \
           grep -r "token.*=" src/ --exclude-dir=target; then
          echo "⚠️ Possíveis credenciais encontradas no código!"
          exit 1
        else
          echo "✅ Nenhuma credencial encontrada no código"
        fi

  pr-validation:
    name: 🔍 Validação de PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 📋 Verificar arquivos modificados
      run: |
        echo "📁 Arquivos modificados neste PR:"
        git diff --name-only origin/${{ github.base_ref }}...HEAD
        
        echo "🔍 Verificando se DataLoader.java foi modificado..."
        if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "DataLoader.java"; then
          echo "✅ DataLoader.java foi modificado - possível adição de feriados"
          echo "📝 Lembre-se de verificar:"
          echo "  - Dados corretos dos feriados"
          echo "  - Fontes oficiais mencionadas"
          echo "  - Formatação adequada"
        fi